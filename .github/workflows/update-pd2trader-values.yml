name: Update PD2 Trader Values

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-pd2trader-values
  cancel-in-progress: false

jobs:
  update-pd2trader-values:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Update rune and currency values - main
        run: node scripts/update-pd2trader-runes.mjs
        env:
          FILTER_FILE: Roofoo.filter
          PD2TRADER_LADDER: 'true'
          PD2TRADER_HARDCORE: 'false'

      - name: Update rune and currency values - mystery
        run: node scripts/update-pd2trader-runes.mjs
        env:
          FILTER_FILE: RoofooMystery.filter
          PD2TRADER_LADDER: 'true'
          PD2TRADER_HARDCORE: 'false'

      - name: Update BIS slam values - main
        run: node scripts/update-pd2trader-bis-slams.mjs
        env:
          FILTER_FILE: Roofoo.filter
          PD2TRADER_LADDER: 'true'
          PD2TRADER_HARDCORE: 'false'
          PD2TRADER_HOURS: '48'
          PD2TRADER_BIS_MIN_SAMPLES: '2'

      - name: Update BIS slam values - mystery
        run: node scripts/update-pd2trader-bis-slams.mjs
        env:
          FILTER_FILE: RoofooMystery.filter
          PD2TRADER_LADDER: 'true'
          PD2TRADER_HARDCORE: 'false'
          PD2TRADER_HOURS: '48'
          PD2TRADER_BIS_MIN_SAMPLES: '2'

      - name: Update Rainbow Facet values - main
        run: node scripts/update-pd2trader-facets.mjs
        env:
          FILTER_FILE: Roofoo.filter
          PD2TRADER_LADDER: 'true'
          PD2TRADER_HARDCORE: 'false'

      - name: Update Rainbow Facet values - mystery
        run: node scripts/update-pd2trader-facets.mjs
        env:
          FILTER_FILE: RoofooMystery.filter
          PD2TRADER_LADDER: 'true'
          PD2TRADER_HARDCORE: 'false'

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- Roofoo.filter RoofooMystery.filter; then
            echo "No PD2 Trader value changes to commit."
            exit 0
          fi
          git add Roofoo.filter RoofooMystery.filter
          git commit -m "Update PD2 Trader values"
          git pull --rebase origin main
          git push origin HEAD:main
